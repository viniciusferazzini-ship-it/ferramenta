version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ferramenta_db
    environment:
      POSTGRES_USER: ferramenta
      POSTGRES_PASSWORD: ferramenta_dev
      POSTGRES_DB: ferramenta_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ferramenta']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
